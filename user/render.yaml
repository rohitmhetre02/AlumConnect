services:
  # Express server service for React Router support
  - type: web
    name: alumni-connect
    env: node
    buildCommand: "npm install && npm run build"
    startCommand: "npm start"
    envVars:
      - key: NODE_ENV
        value: production
    # Health check to ensure the service is running
    healthCheckPath: /
    # Auto-deploy on push to main branch
    autoDeploy: true
